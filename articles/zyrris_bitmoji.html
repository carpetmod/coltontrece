    <script type="module">
        function go(path) {
            // 1. Create a URL object for your destination path
            const targetUrl = new URL(path, window.location.origin);

            // 2. Append the current page's search parameters
            targetUrl.search = window.location.search;

            // 3. Navigate safely with the parameters preserved
            window.location.assign(targetUrl.href);
        }

    </script>
